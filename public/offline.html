<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - IVMS</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Inter, system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e1b4b);
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .container { text-align: center; max-width: 400px; }
        .icon {
            width: 80px; height: 80px;
            background: linear-gradient(135deg, #6366f1, #4338ca);
            border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 2rem;
            box-shadow: 0 8px 32px rgba(99, 102, 241, 0.3);
        }
        .icon span { color: white; font-weight: 700; font-size: 28px; }
        h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.75rem; }
        p { color: #94a3b8; font-size: 0.925rem; line-height: 1.6; margin-bottom: 2rem; }
        button {
            background: linear-gradient(135deg, #6366f1, #4338ca);
            color: white; border: none; padding: 12px 32px;
            border-radius: 12px; font-size: 0.925rem; font-weight: 600;
            cursor: pointer; transition: transform 0.15s, box-shadow 0.15s;
            box-shadow: 0 4px 16px rgba(99, 102, 241, 0.3);
        }
        button:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(99, 102, 241, 0.4); }
        button:active { transform: translateY(0); }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon"><span>IV</span></div>
        <h1>You're Offline</h1>
        <p>It looks like you've lost your internet connection. Please check your network and try again.</p>
        <button onclick="window.location.reload()">Try Again</button>
    </div>
</body>
</html>
