# Nixpacks build for Interior Villa ERP (Laravel 11 + Inertia + Vite)
# Uses PHP 8.3 + PHP's built-in server via `php artisan serve`.
# For higher traffic: swap to PHP-FPM + Nginx (separate config needed).

[phases.setup]
nixPkgs = [
    "php83",
    "php83Packages.composer",
    "php83Extensions.pdo_mysql",
    "php83Extensions.mbstring",
    "php83Extensions.xml",
    "php83Extensions.gd",
    "php83Extensions.bcmath",
    "php83Extensions.intl",
    "php83Extensions.opcache",
    "php83Extensions.pcntl",
    "php83Extensions.curl",
    "php83Extensions.zip",
    "php83Extensions.fileinfo",
    "php83Extensions.tokenizer",
    "nodejs_22",
]

[phases.install]
cmds = [
    "mkdir -p storage/framework/cache storage/framework/sessions storage/framework/views storage/logs bootstrap/cache",
    "chmod -R 775 storage bootstrap/cache",
    "composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist",
    "npm ci --no-audit --no-fund",
]

[phases.build]
cmds = [
    "npm run build",
    "rm -rf node_modules",
]

# Start command runs every time the container boots. All steps are idempotent —
# safe to re-run without duplicating data or overwriting existing passwords.
#   1. migrate                    — apply any new DB schema changes
#   2. storage:link               — create public/storage symlink (no-op if exists)
#   3. db:seed RoleSeeder         — re-sync roles + permission matrix
#   4. db:seed EnsureAdminSeeder  — guarantee admin user exists + has admin role
#                                   (uses firstOrCreate → won't clobber password
#                                   if the user has already changed it)
#   5. db:seed AccountSeeder      — ensure default chart of accounts groups + heads
#                                   exist (uses firstOrCreate → safe to re-run)
#   6. permission:cache-reset     — clear Spatie cache (stale after config:cache)
#   7. cache configs/routes/views for speed
#   8. exec PHP server so signals propagate properly on Coolify restarts
[start]
cmd = "php artisan migrate --force && (php artisan storage:link 2>/dev/null || true) && (php artisan db:seed --class=RoleSeeder --force || echo 'RoleSeeder skipped') && (php artisan db:seed --class=EnsureAdminSeeder --force || echo 'EnsureAdminSeeder skipped') && (php artisan db:seed --class=AccountSeeder --force || echo 'AccountSeeder skipped') && (php artisan permission:cache-reset || true) && php artisan config:cache && php artisan route:cache && php artisan view:cache && exec php artisan serve --host=0.0.0.0 --port=${PORT:-8000}"
